# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Build Lean Docs and Blueprint

on:
  push:
    branches:
      - master
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build project
        uses: leanprover/lean-action@434f25c2f80ded67bba02502ad3a86f25db50709 # 2025-07-02
        with:
          build: true
          lint: true
          mk_all-check: true
      - name: Generate documentation assets
        # workaround for https://github.com/leanprover-community/docgen-action/issues/28
        uses: dwrensha/docgen-action@a3f8189646977363717917b605e6de25f9704656
        with:
          blueprint: true
          homepage: "site"
